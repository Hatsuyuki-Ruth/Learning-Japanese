<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>時・分・秒のアクセント</title>
  <link rel="stylesheet" href="../ja_pitch_tables.css">
  <script defer src="../ja_pitch_tables.js"></script>
  <script defer src="pitch_table_hour_minute_second_data.js"></script>
</head>
<body>
  <h1>時・分・秒のアクセント</h1>
  <p class="note">アクセントは『NHK日本語発音アクセント新辞典』に基づく。</p>

  <div class="table-scroll">
    <table class="pitch-table" id="hours">
      <caption>時</caption>
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <h2>注記</h2>
  <ul class="notes-list" id="hour-notes"></ul>

  <div class="table-scroll">
    <table class="pitch-table" id="minutes">
      <caption>分</caption>
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <h2>注記</h2>
  <ul class="notes-list" id="minute-notes"></ul>

  <div class="table-scroll">
    <table class="pitch-table" id="seconds">
      <caption>秒</caption>
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <h2>注記</h2>
  <ul class="notes-list" id="second-notes"></ul>
</body>
</html>
